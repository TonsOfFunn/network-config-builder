<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Network Config Builder</title>
<style>
    :root {
        --bg: #f3f4f6;
        --card-bg: #ffffff;
        --text: #1f2937;
        --text-muted: #6b7280;
        --border: #d1d5db;
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --secondary: #10b981;
        --secondary-hover: #059669;
        --heading: #111827;
        --input-bg: #fff;
        --textarea-bg: #f8fafc;
        --focus-ring: rgba(37, 99, 235, 0.2);
    }
    [data-theme="dark"] {
        --bg: #111827;
        --card-bg: #1f2937;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --border: #374151;
        --primary: #3b82f6;
        --primary-hover: #2563eb;
        --secondary: #34d399;
        --secondary-hover: #10b981;
        --heading: #f9fafb;
        --input-bg: #374151;
        --textarea-bg: #374151;
        --focus-ring: rgba(59, 130, 246, 0.3);
    }
    body {
        font-family: 'Segoe UI', system-ui, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        line-height: 1.5;
    }
    .container {
        max-width: 1100px;
        margin: 0 auto;
        background: var(--card-bg);
        padding: 25px;
        border-radius: 8px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    h1, h2, h3 {
        margin-top: 0;
        color: var(--heading);
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        margin-bottom: 20px;
    }
    .form-group {
        display: flex;
        flex-direction: column;
    }
    label {
        font-weight: 600;
        margin-bottom: 5px;
        font-size: 0.9rem;
    }
    select, input {
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 4px;
        font-size: 1rem;
        background-color: var(--input-bg);
        color: var(--text);
    }
    select:focus, input:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 2px var(--focus-ring);
    }
    hr {
        border: 0;
        height: 1px;
        background: var(--border);
        margin: 20px 0;
    }
    .script-area {
        display: flex;
        flex-direction: column;
        gap: 10px;
    }
    textarea {
        width: 100%;
        height: 350px;
        padding: 15px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.95rem;
        border: 1px solid var(--border);
        border-radius: 4px;
        background-color: var(--textarea-bg);
        color: var(--text);
        resize: vertical;
        box-sizing: border-box;
    }
    textarea:focus {
        outline: none;
        border-color: var(--primary);
    }
    .buttons {
        display: flex;
        gap: 10px;
    }
    button {
        padding: 10px 15px;
        border: none;
        border-radius: 4px;
        font-weight: 600;
        cursor: pointer;
        transition: background-color 0.2s;
        color: white;
    }
    .btn-copy { background-color: var(--primary); }
    .btn-copy:hover { background-color: var(--primary-hover); }
    .btn-download { background-color: var(--secondary); }
    .btn-download:hover { background-color: var(--secondary-hover); }

    .header-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
        gap: 12px;
        margin-bottom: 20px;
    }
    .header-row h1 { margin: 0; }
    .theme-toggle {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--card-bg);
        color: var(--text);
        font-size: 0.9rem;
        font-weight: 500;
        cursor: pointer;
        transition: background-color 0.2s, border-color 0.2s;
    }
    .theme-toggle:hover {
        background: var(--border);
    }
    .theme-toggle svg {
        width: 18px;
        height: 18px;
        flex-shrink: 0;
    }
</style>
</head>
<body>

<div class="container">
    <div class="header-row">
        <h1>Network Config Builder</h1>
        <button type="button" class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
            <svg id="iconSun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
            <svg id="iconMoon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
            <span id="themeLabel">Dark mode</span>
        </button>
    </div>
    
    <div class="grid">
        <div class="form-group">
            <label for="vendor">Vendor</label>
            <select id="vendor"></select>
        </div>
        <div class="form-group">
            <label for="deviceType">Device Type</label>
            <select id="deviceType"></select>
        </div>
        <div class="form-group">
            <label for="os">OS</label>
            <select id="os"></select>
        </div>
        <div class="form-group">
            <label for="feature">Feature to Configure</label>
            <select id="feature"></select>
        </div>
    </div>

    <hr>

    <h3>Feature Parameters</h3>
    <div id="dynamicForm" class="grid">
        <!-- Dynamic inputs generated here -->
    </div>

    <hr>

    <div class="script-area">
        <h3>Generated Configuration Script</h3>
        <p style="margin-top: -10px; font-size: 0.85rem; color: var(--text-muted);">Edits in the form automatically update this script. You can also manually edit the text below.</p>
        <textarea id="outputScript"></textarea>
        <div class="buttons">
            <button class="btn-copy" id="copyBtn">Copy to Clipboard</button>
            <button class="btn-download" id="downloadBtn">Download .txt</button>
        </div>
    </div>
</div>

<script>
(function() {
    var stored = localStorage.getItem('theme');
    var prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    var dark = stored === 'dark' || (!stored && prefersDark);
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
})();
</script>

            { id: 'ipAddress', label: 'Interface IP Address', type: 'text', default: '192.168.1.2' },
            { id: 'mask', label: 'Subnet Mask', type: 'text', default: '255.255.255.0' },
            { id: 'group', label: 'HSRP Group', type: 'number', default: '1' },
            { id: 'virtualIp', label: 'Virtual IP', type: 'text', default: '192.168.1.1' }
        ]
    },
    vrrp: {
        label: 'VRRP',
        allowed: { juniper: ['Switch', 'Router'] },
        fields: [
            { id: 'interface', label: 'Interface', type: 'text', default: 'irb.10' },
            { id: 'realIp', label: 'Physical IP / Prefix', type: 'text', default: '192.168.10.2/24' },
            { id: 'group', label: 'VRRP Group', type: 'number', default: '1' },
            { id: 'virtualIp', label: 'Virtual IP', type: 'text', default: '192.168.10.1' },
            { id: 'priority', label: 'Priority', type: 'number', default: '110' }
        ]
    }
};

// DOM Elements
const vendorSel = document.getElementById('vendor');
const deviceTypeSel = document.getElementById('deviceType');
const osSel = document.getElementById('os');
const featureSel = document.getElementById('feature');
const dynamicForm = document.getElementById('dynamicForm');
const outputScript = document.getElementById('outputScript');
const copyBtn = document.getElementById('copyBtn');
const downloadBtn = document.getElementById('downloadBtn');

function init() {
    populateDropdown(vendorSel, Object.keys(vendors).map(k => ({ value: k, label: vendors[k].label })));
    vendorSel.addEventListener('change', updateDeviceTypes);
    deviceTypeSel.addEventListener('change', updateOS);
    deviceTypeSel.addEventListener('change', updateFeatures);
    osSel.addEventListener('change', generateScript);
    featureSel.addEventListener('change', renderForm);
    
    // Set initial sensible defaults
    vendorSel.value = 'cisco';
    updateDeviceTypes();
    deviceTypeSel.value = 'Switch';
    updateOS();
    updateFeatures();
    featureSel.value = 'vlan';
    renderForm();
}

function populateDropdown(element, options) {
    element.innerHTML = '';
    options.forEach(opt => {
        const option = document.createElement('option');
        option.value = opt.value;
        option.textContent = opt.label;
        element.appendChild(option);
    });
}

function updateDeviceTypes() {
    const v = vendorSel.value;
    populateDropdown(deviceTypeSel, vendors[v].types.map(t => ({ value: t, label: t })));
    updateOS();
    updateFeatures();
}

function updateOS() {
    const v = vendorSel.value;
    const t = deviceTypeSel.value;
    if (vendors[v].os[t]) {
        populateDropdown(osSel, vendors[v].os[t].map(o => ({ value: o, label: o })));
    } else {
        osSel.innerHTML = '';
    }
    generateScript();
}

function updateFeatures() {
    const v = vendorSel.value;
    const t = deviceTypeSel.value;
    
    const validFeatures = Object.keys(features).filter(k => {
        const feat = features[k];
        return feat.allowed[v] && feat.allowed[v].includes(t);
    }).map(k => ({ value: k, label: features[k].label }));
    
    populateDropdown(featureSel, validFeatures);
    if(validFeatures.length > 0) {
        featureSel.value = validFeatures[0].value;
    }
    renderForm();
}

function renderForm() {
    dynamicForm.innerHTML = '';
    const f = featureSel.value;
    if (!f || !features[f]) return;
    
    features[f].fields.forEach(field => {
        const div = document.createElement('div');
        div.className = 'form-group';
        
        const label = document.createElement('label');
        label.htmlFor = field.id;
        label.textContent = field.label;
        
        const input = document.createElement('input');
        input.type = field.type;
        input.id = field.id;
        input.value = field.default;
        
        input.addEventListener('input', generateScript);
        
        div.appendChild(label);
        div.appendChild(input);
        dynamicForm.appendChild(div);
    });
    
    generateScript();
}

function getFormData() {
    const f = featureSel.value;
    const data = {};
    if (!f || !features[f]) return data;
    
    features[f].fields.forEach(field => {
        const el = document.getElementById(field.id);
        if (el) data[field.id] = el.value;
    });
    return data;
}

function generateScript() {
    const vendor = vendorSel.value;
    const type = deviceTypeSel.value;
    const os = osSel.value;
    const feature = featureSel.value;
    const d = getFormData();
    
    const feat = features[feature];
    if (!feat) return;
    if (feat.fields.length > 0 && Object.keys(d).length === 0) return;

    let script = '';

    if (vendor === 'cisco') {
        script += generateCisco(feature, d, os);
    } else if (vendor === 'juniper') {
        script += generateJuniper(feature, d, os);
    }

    script = script.split('\n').map(function(line) { return line.replace(/^\s+/, ''); }).join('\n');
    script = script.split('\n').filter(function(line) { return !line.startsWith('!'); }).join('\n');
    outputScript.value = script;
}

function generateCisco(f, d, os) {
    let s = '';
    const isNXOS = os === 'NX-OS';
    
    switch(f) {
        case 'backup_tftp':
            s += `enable\ncopy running-config tftp\n${d.tftpIp}\n`;
            break;
        case 'banner_motd':
            s += `enable\nconf t\nbanner motd '${d.bannerText}'\nexit\n`;
            break;
        case 'enable_mode':
            s += `enable\nconf t\nservice password-encryption\nenable secret ${d.enableSecret}\nexit\n`;
            break;
        case 'line_console':
            s += `enable\nconf t\nline console 0\npassword ${d.password}\nlogin\nexit\n`;
            break;
        case 'line_aux':
            s += `enable\nconf t\nline aux 0\npassword ${d.password}\nlogin\nexit\n`;
            break;
        case 'line_vty':
            s += `enable\nconf t\nline vty ${d.vtyRange}\nlogin ${d.loginMethod}\ntransport input ssh\nexit\n`;
            break;
        case 'username':
            s += `enable\nconf t\nusername ${d.username} secret ${d.secret}\nexit\n`;
            break;
        case 'ssh_config':
            s += `enable\nconf t\nhostname ${d.hostname}\nip domain-name ${d.domainName}\ncrypto key generate rsa\n${d.rsaBits}\nip ssh version 2\n`;
            s += `line con 0\nlogin\nexit\nline aux 0\nlogin\nexit\nline vty 0 15\ntransport input ssh\nlogin local\nexit\n`;
            break;
        case 'switch_security_ssh':
            s += `enable\nconf t\nline console 0\npassword ${d.consolePassword}\nlogin\nlogging synchronous\nexit\n`;
            s += `banner motd '${d.bannerText}'\nexit\nconf t\nservice password-encryption\nenable secret ${d.enableSecret}\nexit\n`;
            s += `conf t\nline vty 0 4\nlogin local\ntransport input ssh\nlogging synchronous\nexit\n`;
            s += `username ${d.username} secret ${d.secret}\nhostname ${d.hostname}\nip domain-name ${d.domainName}\ncrypto key generate rsa\n1024\nip ssh version 2\n`;
            break;
        case 'vlan':
            s += `conf t\nvlan ${d.vlanId}\n name ${d.vlanName}\nexit\n`;
            if (d.accessPorts) {
                s += `interface range ${d.accessPorts}\n switchport mode access\n switchport access vlan ${d.vlanId}\n no shutdown\nexit\n`;
            }
            if (isNXOS) s = `feature vlan\n` + s;
            break;
        case 'vlan_trunking':
            s += `conf t\ninterface ${d.interface}\nswitchport mode trunk\nend\n`;
            break;
        case 'stp':
            s += `spanning-tree mode ${d.stpMode}\nspanning-tree vlan ${d.vlanId} priority ${d.priority}\n`;
            break;
        case 'stp_root_primary':
            s += `enable\nconf t\nspanning-tree vlan ${d.vlanId} root primary\nexit\n`;
            break;
        case 'stp_root_secondary':
            s += `enable\nconf t\nspanning-tree vlan ${d.vlanId} root secondary\nexit\n`;
            break;
        case 'portfast_bpdu':
            s += `conf t\ninterface ${d.interface}\n`;
            if (isNXOS) {
                s += ` spanning-tree port type edge\n spanning-tree bpduguard enable\n`;
            } else {
                s += ` spanning-tree portfast\n spanning-tree bpduguard enable\n`;
            }
            s += `exit\n`;
            break;
        case 'enable_global_portfast_bpdu':
            s += `enable\nconf t\nspanning-tree portfast bpduguard default\nspanning-tree portfast default\nexit\n`;
            break;
        case 'enable_interface_portfast_bpdu':
            s += `enable\nconf t\nint range ${d.interface}\nshutdown\nspanning-tree portfast\nspanning-tree bpduguard enable\nno shutdown\nexit\n`;
            break;
        case 'port_security':
            s += `conf t\ninterface range ${d.interface}\nswitchport mode access\nswitchport port-security\nswitchport port-security mac-address sticky\nexit\n`;
            break;
        case 'lacp_etherchannel':
            s += `conf t\nint range ${d.interfaceRange}\nchannel-group ${d.channelGroup} mode ${d.mode}\nexit\n`;
            break;
        case 'standard_acl':
            s += `conf t\naccess-list ${d.aclNum} ${d.action1} ${d.source1}\nint ${d.applyInterface}\nip access-group ${d.aclNum} ${d.direction}\nexit\n`;
            break;
        case 'extended_acl':
            s += `conf t\naccess-list ${d.aclNum} ${d.rule1}\n`;
            if (d.rule2) s += `access-list ${d.aclNum} ${d.rule2}\n`;
            s += `int ${d.applyInterface}\nip access-group ${d.aclNum} ${d.direction}\nexit\n`;
            break;
        case 'insert_ext_acl':
            s += `enable\nconf t\nip access-list extended ${d.aclNum}\n${d.seq} ${d.entry}\nexit\n`;
            break;
        case 'delete_ext_acl':
            s += `enable\nconf t\nip access-list extended ${d.aclNum}\nno ${d.seq}\nexit\n`;
            break;
        case 'acl':
            s += `ip access-list extended ${d.aclName}\n ${d.action} ${d.protocol} ${d.source} ${d.dest}\n`;
            break;
        case 'dhcp':
            if (isNXOS) s += `feature dhcp\n`;
            if (d.excludedStart && d.excludedEnd) s += `ip dhcp excluded-address ${d.excludedStart} ${d.excludedEnd}\nservice dhcp\n`;
            s += `ip dhcp pool ${d.poolName}\n network ${d.network} ${d.mask}\n default-router ${d.gateway}\n dns-server ${d.dns}\n`;
            break;
        case 'static_route_v4':
            s += `ip route ${d.network} ${d.mask} ${d.nexthop}\n`;
            break;
        case 'static_route_v6':
            s += `ipv6 route ${d.network} ${d.nexthop}\n`;
            break;
        case 'loopback':
            s += `enable\nconf t\nint loopback ${d.loopbackNum}\n`;
            if (d.description) s += `description ${d.description}\n`;
            s += `ip address ${d.ipAddress} ${d.mask}\nno shutdown\nexit\n`;
            break;
        case 'ospf':
            s += `enable\nconf t\nrouter ospf ${d.processId}\nnetwork ${d.network} ${d.wildcard} area ${d.area}\nend\n`;
            break;
        case 'ripv2':
            s += `enable\nconf t\nrouter rip\nversion 2\nno auto-summary\n`;
            (d.networks || '').split(/\s+/).forEach(function(net) { if (net) s += `network ${net}\n`; });
            s += `exit\n`;
            break;
        case 'enable_ipv6_unicast':
            s += `enable\nconf t\nipv6 unicast-routing\n`;
            break;
        case 'ipv6_ospfv3':
            s += `enable\nconf t\nipv6 router ospf ${d.processId}\nrouter-id ${d.routerId}\nint ${d.interface}\nipv6 ospf ${d.processId} area ${d.area}\nexit\n`;
            break;
        case 'roas':
            s += `conf t\nint ${d.subInt}\nencapsulation dot1q ${d.vlanId}\nip address ${d.ipAddress} ${d.mask}\nno shutdown\nexit\n`;
            break;
        case 'ipv6_roas':
            s += `enable\nconf t\nint ${d.subInt}\nencapsulation dot1Q ${d.vlanId}\nipv6 address ${d.ipv6Address}\nipv6 enable\nexit\n`;
            break;
        case 'nat_pat':
            s += `conf t\naccess-list ${d.aclNum} permit ${d.insideNetwork}\nip nat inside source list ${d.aclNum} interface ${d.outsideInterface} overload\n`;
            s += `interface ${d.insideInterface}\nip nat inside\nexit\ninterface ${d.outsideInterface}\nip nat outside\nexit\n`;
            break;
        case 'gre':
            s += `enable\nconf t\ninterface tunnel ${d.tunnelId}\nip address ${d.tunnelIp} ${d.tunnelMask}\ntunnel source ${d.sourceIp}\ntunnel destination ${d.destIp}\nexit\n`;
            break;
        case 'ipsec_vpn':
            s += `enable\nconf t\ncrypto isakmp policy 1\nauthentication pre-share\nencryption aes 256\nhash sha\ngroup 1\nlifetime 3600\nexit\n`;
            s += `crypto isakmp key ${d.psk} address ${d.peerIp}\n`;
            s += `crypto ipsec transform-set MYSET esp-aes esp-sha-hmac\n`;
            s += `access-list ${d.aclNum} permit ip ${d.localNet} ${d.remoteNet}\n`;
            s += `crypto map MYMAP 1 ipsec-isakmp\nset transform-set MYSET\nset peer ${d.peerIp}\nmatch address ${d.aclNum}\nexit\n`;
            s += `int ${d.interface}\ncrypto map MYMAP\nend\n`;
            break;
        case 'hsrp':
            s += `enable\nconf t\ninterface ${d.interface}\nip address ${d.ipAddress} ${d.mask}\nno shutdown\nstandby ${d.group} ip ${d.virtualIp}\nexit\n`;
            if (isNXOS) s = `feature hsrp\n` + s;
            break;
    }
    return s;
}

function generateJuniper(f, d, os) {
    let s = '';
    switch(f) {
        case 'vlan':
            s += `set vlans ${d.vlanName} vlan-id ${d.vlanId}\n`;
            break;
        case 'stp':
            s += `set protocols rstp interface ${d.interface}\n`;
            s += `set protocols rstp bridge-priority ${d.priority}\n`;
            break;
        case 'portfast_bpdu':
            s += `set protocols rstp interface ${d.interface} edge\n`;
            s += `set protocols layer2-control bpdu-block interface ${d.interface}\n`;
            break;
        case 'acl':
            s += `set firewall family inet filter ${d.aclName} term 1 from protocol ${d.protocol}\n`;
            if (d.source !== 'any') s += `set firewall family inet filter ${d.aclName} term 1 from source-address ${d.source}\n`;
            if (d.dest !== 'any') s += `set firewall family inet filter ${d.aclName} term 1 from destination-address ${d.dest}\n`;
            s += `set firewall family inet filter ${d.aclName} term 1 then ${d.action === 'permit' ? 'accept' : 'reject'}\n`;
            break;
        case 'dhcp':
            s += `set access address-assignment pool ${d.poolName} family inet network ${d.network}/${d.mask}\n`;
            s += `set access address-assignment pool ${d.poolName} family inet dhcp-attributes router ${d.gateway}\n`;
            s += `set access address-assignment pool ${d.poolName} family inet dhcp-attributes name-server ${d.dns}\n`;
            break;
        case 'static_route_v4':
            s += `set routing-options static route ${d.network}/${d.mask} next-hop ${d.nexthop}\n`;
            break;
        case 'static_route_v6':
            s += `set routing-options rib inet6.0 static route ${d.network} next-hop ${d.nexthop}\n`;
            break;
        case 'gre':
            s += `set interfaces gr-0/0/0 unit ${d.tunnelId} tunnel source ${d.sourceIp}\n`;
            s += `set interfaces gr-0/0/0 unit ${d.tunnelId} tunnel destination ${d.destIp}\n`;
            s += `set interfaces gr-0/0/0 unit ${d.tunnelId} family inet address ${d.tunnelIp}/${d.tunnelMask}\n`;
            break;
        case 'ipsec_vpn':
            s += `set security ike proposal IKE_PROP authentication-method pre-shared-keys\n`;
            s += `set security ike policy IKE_POL proposals IKE_PROP\n`;
            s += `set security ike policy IKE_POL pre-shared-key ascii-text ${d.psk}\n`;
            s += `set security ike gateway IKE_GW ike-policy IKE_POL\n`;
            s += `set security ike gateway IKE_GW address ${d.peerIp}\n`;
            s += `set security ike gateway IKE_GW external-interface ${d.interface}\n`;
            s += `set security ipsec proposal IPSEC_PROP protocol esp\n`;
            s += `set security ipsec policy IPSEC_POL proposals IPSEC_PROP\n`;
            s += `set security ipsec vpn VPN_TUNNEL ike gateway IKE_GW\n`;
            s += `set security ipsec vpn VPN_TUNNEL ipsec-policy IPSEC_POL\n`;
            s += `set security ipsec vpn VPN_TUNNEL establish-tunnels immediately\n`;
            break;
        case 'vrrp':
            s += `set interfaces ${d.interface} unit 0 family inet address ${d.realIp} vrrp-group ${d.group} virtual-address ${d.virtualIp}\n`;
            s += `set interfaces ${d.interface} unit 0 family inet address ${d.realIp} vrrp-group ${d.group} priority ${d.priority}\n`;
            s += `set interfaces ${d.interface} unit 0 family inet address ${d.realIp} vrrp-group ${d.group} preempt\n`;
            break;
    }
    return s;
}

// Button listeners
copyBtn.addEventListener('click', () => {
    outputScript.select();
    document.execCommand('copy');
    const originalText = copyBtn.textContent;
    copyBtn.textContent = 'Copied!';
    setTimeout(() => { copyBtn.textContent = originalText; }, 2000);
});

downloadBtn.addEventListener('click', () => {
    const text = outputScript.value;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = `config_${vendorSel.value}_${featureSel.value}.txt`;
    a.click();
    URL.revokeObjectURL(a.href);
});

// Boot
function applyThemeUI() {
    var isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    var iconSun = document.getElementById('iconSun');
    var iconMoon = document.getElementById('iconMoon');
    var label = document.getElementById('themeLabel');
    if (iconSun) iconSun.style.display = isDark ? 'none' : 'block';
    if (iconMoon) iconMoon.style.display = isDark ? 'block' : 'none';
    if (label) label.textContent = isDark ? 'Light mode' : 'Dark mode';
}
document.getElementById('themeToggle').addEventListener('click', function() {
    var el = document.documentElement;
    var isDark = el.getAttribute('data-theme') === 'dark';
    el.setAttribute('data-theme', isDark ? 'light' : 'dark');
    localStorage.setItem('theme', isDark ? 'light' : 'dark');
    applyThemeUI();
});
window.onload = function() {
    init();
    applyThemeUI();
};
</script>
